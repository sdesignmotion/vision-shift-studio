<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Shift Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --gold:#C9963A;
  --bg:#0b0d14;
  --bg2:#10131e;
  --bg3:#161923;
  --muted:rgba(240,240,240,0.4);
  --border:rgba(255,255,255,0.08);
}

html{scroll-behavior:smooth;}

body{
  font-family:'Montserrat',sans-serif;
  background:var(--bg);
  color:#f0f0f0;
  min-height:100vh;
}

/* ===== NAV ===== */
nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:1rem 2.5rem;
  border-bottom:0.5px solid var(--border);
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:100;
  background:rgba(11,13,20,0.88);
  backdrop-filter:blur(14px);
}

/* ===== HERO ===== */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

.hero-video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}

.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(11,13,20,0.2),rgba(11,13,20,0.9));
  z-index:1;
}

/* ===== SECTIONS ===== */
section{padding:5rem 2.5rem;}

.section-label{
  font-size:10px;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--gold);
  font-weight:600;
  margin-bottom:3rem;
  display:flex;
  align-items:center;
  gap:1rem;
}

/* ===== GRID ===== */
.video-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:18px;
}

/* ===== PREMIUM VIDEO BOX (FIXED + UPGRADED ONLY) ===== */
.video-box{
  display:flex;
  flex-direction:column;
  gap:10px;
  cursor:pointer;
  transition:transform .35s ease;
}

.video-box:hover{
  transform:scale(1.04);
}

/* THUMB */
.video-thumb{
  position:relative;
  aspect-ratio:16/9;
  overflow:hidden;
  border-radius:10px;
  background:var(--bg3);
  border:0.5px solid var(--border);
  transition:all .35s ease;
}

.video-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* CINEMATIC OVERLAY */
.video-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.85),
    rgba(0,0,0,0.2),
    transparent
  );
  display:flex;
  align-items:flex-end;
  padding:14px;
}

/* TEXT */
.video-title{
  font-size:12px;
  font-weight:600;
  letter-spacing:1px;
  text-transform:uppercase;
  color:#fff;
}

.video-desc{
  font-size:11px;
  color:rgba(255,255,255,0.65);
  margin-top:2px;
}

/* HOVER GLOW */
.video-box:hover .video-thumb{
  transform:scale(1.02);
  border-color:var(--gold);
  box-shadow:0 14px 45px rgba(0,0,0,0.6);
}

/* ===== ORIGINAL WISTIA GRID SUPPORT ===== */
.video-card{
  position:relative;
  aspect-ratio:16/10;
  overflow:hidden;
  background:var(--bg3);
  cursor:pointer;
  border:0.5px solid var(--border);
}

.video-card video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.play-overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:opacity .25s;
}

.video-card:hover .play-overlay{
  opacity:1;
}

</style>
</head>

<body>

<!-- HERO (UNCHANGED) -->
<div class="hero">
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="LOOP.mp4" type="video/mp4">
  </video>
  <div class="hero-overlay"></div>
</div>

<!-- ================= EVENT ================= -->
<section>
<div class="section-label">EVENT</div>

<div class="video-grid" id="grid-events"></div>
</section>

<!-- ================= DANCE ================= -->
<section>
<div class="section-label">DANCE</div>

<div class="video-grid" id="grid-dance"></div>
</section>

<!-- ================= COMMERCIAL ================= -->
<section>
<div class="section-label">COMMERCIAL</div>

<div class="video-grid" id="grid-commercial"></div>
</section>

<!-- ================= ORIGINAL WISTIA SCRIPT (RESTORED) ================= -->
<script>
const videoData = {
  events: [
    'd55rd8i57p','21pz3thqub','pet8kzo2z8',
    'u35yoio9s9','30fz4el1tj','olkrivi2qt'
  ],

  dance: [
    'j3wi77124k','mzcj4p3gdr','0ly4vbju1k'
  ],

  commercial: [
    'zrbh6tuzg4','sygumeggso','hwvknhk57i'
  ]
};

function buildGrids(){

  Object.keys(videoData).forEach(cat=>{

    const grid=document.getElementById('grid-'+cat);

    videoData[cat].forEach(id=>{

      fetch(`https://fast.wistia.com/oembed?url=https://vasilslavkov2.wistia.com/medias/${id}`)
      .then(res=>res.json())
      .then(data=>{

        const box=document.createElement('div');
        box.className='video-box';

        box.innerHTML=`
          <div class="video-thumb">
            <img src="${data.thumbnail_url}">
            <div class="video-overlay"></div>
          </div>

          <div class="video-title">Project</div>
          <div class="video-desc">Cinematic work</div>
        `;

        grid.appendChild(box);

      });

    });

  });

}

buildGrids();
</script>

</body>
</html>
